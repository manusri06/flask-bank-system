<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSS Pay - Deposit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f2f5 50%, #d8a5ff 50%, #8ec5fc 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            overflow: hidden; 
        }

        /* --- TRANSPARENT SIDEBAR --- */
        .sidebar {
            width: 240px; /* Scaled down width */
            background: rgba(255, 255, 255, 0.15); /* More transparent */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            padding: 30px 15px;
            z-index: 10;
        }

        .sidebar img {
            width: 100px; /* Scaled down logo */
            margin-bottom: 40px;
            align-self: center;
        }

        .nav-item {
            color: rgba(40, 81, 128, 0.8); 
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover {
            background: rgba(77, 109, 161, 0.3);
            color: #4a6cf7;
        }

        .nav-item.active {
            background: rgba(74, 108, 247, 0.2); /* Transparent Blue */
            color: #4a6cf7;
            border: 1px solid rgba(74, 108, 247, 0.3);
        }

        /* --- WORKSPACE --- */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .deposit-flow {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .currency-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(40, 81, 128, 0.6);
            margin-bottom: 5px;
            display: block;
            font-weight: 700;
        }

        /* Scaled Down Input */
        input[type="number"] {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(111, 63, 139, 0.2);
            font-size: 4rem; /* Reduced size */
            font-weight: 700;
            width: 100%;
            text-align: center;
            outline: none;
            color: rgba(26, 42, 64, 0.9);
            padding: 10px;
            transition: 0.3s;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        input[type="number"]:focus {
            border-bottom-color: #964bbe;
            transform: scale(1.02);
        }

        /* Transparent Glass Button */
        .confirm-btn {
            margin-top: 40px;
            padding: 15px 45px;
            background: rgba(255, 255, 255, 0.2); /* Glass base */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #4a6cf7;
            border: 1px solid rgba(74, 108, 247, 0.4);
            border-radius: 30px; 
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
        }

        .confirm-btn:hover {
            background: linear-gradient(135deg, #7567de, #a29bfe);
            color: #fff;
            box-shadow: 0 10px 25px rgba(74, 108, 247, 0.3);
            transform: translateY(-3px);
        }

        .status-msg {
            margin-top: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #814f8d;
        }

       .footer{
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 13px;
            color: #666;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; padding: 15px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.2); }
            input[type="number"] { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="{{ url_for('static', filename='MSS_logobg.png') }}" alt="Logo">
        
        <a href="/dashboard" class="nav-item">Dashboard</a>
        <a href="/addbal" class="nav-item active">Deposit Money</a>
        <a href="/pay" class="nav-item">Transfer</a>
        <a href="/viewbal" class="nav-item">Check Balance</a>
        <a href="/history" class="nav-item">History</a>
        
        <div style="margin-top: auto;">
            <a href="/logout" class="nav-item" style="color: #ff7675; opacity: 0.8;">Logout</a>
        </div>
    </div>

    <div class="workspace">
        <form method="POST" class="deposit-flow">
            <span class="currency-label">Amount to Deposit</span>
            <input type="number" name="money" placeholder="0" min="1" step="0.01" required autofocus>

            <button type="submit" class="confirm-btn">Confirm Deposit</button>

            {% if state %}
                <p class="status-msg">{{ state }}</p>
            {% endif %}
        </form>
    </div>

    <footer class="footer">
    © 2026 <strong>MSS Pay</strong> • Secure Digital Payment Platform
</footer>

</body>
</html>
