<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSS Pay - Account Balance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f2f5 50%, #d8a5ff 50%, #8ec5fc 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 240px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            padding: 30px 15px;
            z-index: 10;
        }

        .sidebar img {
            width: 100px;
            margin-bottom: 40px;
            align-self: center;
        }

        .nav-item {
            color: rgba(40, 81, 128, 0.8); 
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover {
            background: rgba(77, 109, 161, 0.3);
            color: #4a6cf7;
        }

        .nav-item.active {
            background: rgba(74, 108, 247, 0.2);
            color: #4a6cf7;
            border: 1px solid rgba(74, 108, 247, 0.3);
        }

        /* --- WORKSPACE --- */
        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Scaled down the container */
        .balance-card {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 340px; /* Much smaller width */
        }

        .balance-label {
            font-size: 0.7rem; /* Tiny label for pro look */
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(40, 81, 128, 0.6);
            margin-bottom: 10px;
            display: block;
            font-weight: 700;
        }

        /* Reduced font size from 4rem to 2.2rem */
        .amount {
            font-size: 2.2rem; 
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .currency-symbol {
            font-size: 1.2rem;
            margin-right: 4px;
            font-weight: 500;
            color: #4a6cf7;
        }

        .back-btn {
            text-decoration: none;
            padding: 10px 24px;
            background: rgba(74, 108, 247, 0.1);
            color: #4a6cf7;
            border-radius: 12px; 
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #7567de, #a29bfe);
            color: #fff;
            transform: translateY(-2px);
        }

        .footer{
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 13px;
            color: #666;
        }

        /* Styling for the Account ID section */
        .account-info {
            background: rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .acc-label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: rgba(40, 81, 128, 0.6);
            font-weight: 700;
            margin-bottom: 2px;
        }

        .acc-value {
            font-size: 1rem;
            font-weight: 600;
            color: #2d3436;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; padding: 15px; border-right: none; }
            .balance-card { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="{{ url_for('static', filename='MSS_logobg.png') }}" alt="Logo">
        <a href="/dashboard" class="nav-item">Dashboard</a>
        <a href="/addbal" class="nav-item">Deposit Money</a>
        <a href="/pay" class="nav-item">Transfer</a>
        <a href="/viewbal" class="nav-item active">Check Balance</a>
        <a href="/history" class="nav-item">History</a>
        <div style="margin-top: auto;">
            <a href="/logout" class="nav-item" style="color: #ff7675; opacity: 0.8;">Logout</a>
        </div>
    </div>

    <div class="workspace">
        <div class="balance-card">
            <span class="balance-label">Total Balance</span>
            
            <div class="amount">
                <span class="currency-symbol"></span>
                {% if bal %}{{ bal }}{% else %}0.00{% endif %}
            </div>

            <div class="account-info">
            <span class="acc-label">Account ID</span>
            <span class="acc-value">{% if accc_id %}{{ accc_id }}{% else %}N/A{% endif %}</span>
            </div>

            <a href="/dashboard" class="back-btn">Return to Home</a>
        </div>
    </div>

    <footer class="footer">
        © 2026 <strong>MSS Pay</strong> • Secure Digital Payment Platform
    </footer>

</body>
</html>
